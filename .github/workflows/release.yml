# Based partially on Alyxia's work, thanks so much!

name: Release
on:
  push:
    tags:
      - v*
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_COLOR: true

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Install Go
        uses: actions/setup-go@v3
        with:
          go-version: "1.20"

      - name: Checkout code
        uses: actions/checkout@v3

      - uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install Go dependencies
        run: go get -v

      - name: Build Cli
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -v -tags "static cli" -ldflags "-s -w -X 'vencordinstaller/buildinfo.InstallerGitHash=$(git rev-parse --short HEAD)' -X 'vencordinstaller/buildinfo.InstallerTag=${{ github.ref_name }}'" -o VeilInstallerCli-linux

      - name: Update executable
        run: |
          chmod +x VeilInstallerCli-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VeilInstaller-linux
          path: |
            VeilInstallerCli-linux


  build-mac:
    runs-on: macos-latest

    steps:
      - name: Install Go
        uses: actions/setup-go@v3
        with:
          go-version: "1.20"

      - id: go-cache-paths
        run: |
          echo "go_build=$(go env GOCACHE)" >> $GITHUB_ENV
          echo "go_mod=$(go env GOMODCACHE)" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v3

      - uses: actions/cache@v3
        with:
          path: |
            ~/Library/Caches/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: brew install pkg-config sdl2

      - name: Install Go dependencies
        run: go get -v

      - name: Build amd64
        run: CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 go build -v -tags static -ldflags "-s -w -X 'vencordinstaller/buildinfo.InstallerGitHash=$(git rev-parse --short HEAD)' -X 'vencordinstaller/buildinfo.InstallerTag=${{ github.ref_name }}'" -o VeilInstaller-amd64

      - name: Build arm64
        run: CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 go build -v -tags static -ldflags "-s -w -X 'vencordinstaller/buildinfo.InstallerGitHash=$(git rev-parse --short HEAD)' -X 'vencordinstaller/buildinfo.InstallerTag=${{ github.ref_name }}'" -o VeilInstaller-arm64

      - name: Create universal binary
        run: |
          lipo -create -output VeilInstaller VeilInstaller-amd64 VeilInstaller-arm64
          chmod +x VeilInstaller

      - name: Generate MacOS bundle
        # Bundle layout MUST match `CFBundleExecutable` in macos/Info.plist
        # (set to `VeilInstaller`). If those drift apart, Launch Services
        # rejects the bundle with "you can't open the application
        # because it may be damaged or incomplete".
        run: |
          mkdir -p VeilInstaller.app/Contents/MacOS
          mkdir -p VeilInstaller.app/Contents/Resources
          cp macos/Info.plist VeilInstaller.app/Contents/Info.plist
          mv VeilInstaller VeilInstaller.app/Contents/MacOS/VeilInstaller
          cp macos/icon.icns VeilInstaller.app/Contents/Resources/icon.icns

      - name: Ad-hoc codesign
        # Apple Silicon refuses to launch unsigned arm64 binaries with
        # the same "damaged or incomplete" error users see on x86. An
        # ad-hoc signature (sign with the local "-" identity) is enough
        # to satisfy Gatekeeper for distribution outside the App Store.
        # `--deep --force` re-signs every nested binary in the bundle.
        run: codesign --force --deep --sign - VeilInstaller.app

      - name: Zip bundle
        # `ditto` preserves macOS metadata (resource forks, extended
        # attributes, code-signature blobs) that plain `zip` strips on
        # some macOS versions, leaving the unzipped bundle missing its
        # signature. `ditto -c -k --keepParent` is the documented
        # recipe for shipping a signed .app over the wire.
        run: ditto -c -k --keepParent VeilInstaller.app VeilInstaller.MacOS.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VeilInstaller-macos
          path: VeilInstaller.MacOS.zip


  build-windows:
    runs-on: windows-latest

    steps:
      - name: Install Go
        uses: actions/setup-go@v3
        with:
          go-version: "1.20"

      - name: Checkout code
        uses: actions/checkout@v3

      - uses: actions/cache@v3
        with:
          path: |
            ~\AppData\Local\go-build
            ~\go\pkg\mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2

      - name: Install Windows dependencies
        shell: msys2 {0}
        run: |
          pacman -S --noconfirm git mingw-w64-x86_64-gcc mingw-w64-x86_64-SDL2 mingw-w64-x86_64-go
          export GOROOT=/mingw64/lib/go
          export GOPATH=/mingw64

      - name: Install Go dependencies
        shell: msys2 {0}
        run: |
          export GOROOT=/mingw64/lib/go
          export GOPATH=/mingw64
          go get -v
          go install github.com/tc-hib/go-winres@latest

      - name: Build Gui
        shell: msys2 {0}
        run: |
          export GOROOT=/mingw64/lib/go
          export GOPATH=/mingw64
          go-winres make --product-version "git-tag"
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 go build -v -tags static -ldflags "-s -w -H=windowsgui -extldflags=-static -X 'vencordinstaller/buildinfo.InstallerGitHash=$(git rev-parse --short HEAD)' -X 'vencordinstaller/buildinfo.InstallerTag=${{ github.ref_name }}'" -o VeilInstaller.exe

      - name: Build i386 Cli
        shell: msys2 {0}
        run: |
          export GOROOT=/mingw64/lib/go
          export GOPATH=/mingw64
          CGO_ENABLED=0 GOOS=windows GOARCH=386 go build -v -tags "static cli" -ldflags "-s -w -extldflags=-static -X 'vencordinstaller/buildinfo.InstallerGitHash=$(git rev-parse --short HEAD)' -X 'vencordinstaller/buildinfo.InstallerTag=${{ github.ref_name }}'" -o VeilInstallerCli.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VeilInstaller-windows
          path: |
            VeilInstaller.exe
            VeilInstallerCli.exe


  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-mac, build-windows]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - uses: actions/download-artifact@v4
        with:
          name: VeilInstaller-linux
          path: linux

      - uses: actions/download-artifact@v4
        with:
          name: VeilInstaller-macos
          path: macos

      - uses: actions/download-artifact@v4
        with:
          name: VeilInstaller-windows
          path: windows

      - name: Create the release
        uses: softprops/action-gh-release@1e07f4398721186383de40550babbdf2b84acfc5 # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: ${{ github.ref_name }}
          prerelease: false
          draft: false
          files: |
            linux/VeilInstallerCli-linux
            macos/VeilInstaller.MacOS.zip
            windows/VeilInstalle*.exe

  release-devbuild:
    runs-on: ubuntu-latest
    needs: [build-linux, build-mac, build-windows]
    if: github.ref == 'refs/heads/main' && github.repository == 'Gabriele73/VeilInstaller'

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - uses: actions/download-artifact@v4
        with:
          name: VeilInstaller-linux
          path: linux

      - uses: actions/download-artifact@v4
        with:
          name: VeilInstaller-macos
          path: macos

      - uses: actions/download-artifact@v4
        with:
          name: VeilInstaller-windows
          path: windows

      - name: Get short SHA
        id: release_values
        run: echo "release_tag=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Upload DevBuild as release
        run: |
          gh release view devbuild >/dev/null 2>&1 || gh release create devbuild --target main --title "DevBuild" --notes "Automated build of latest main"
          for i in 1 2 3 4 5; do
              if gh release upload devbuild --clobber linux/VeilInstallerCli-linux macos/VeilInstaller.MacOS.zip windows/VeilInstaller.exe windows/VeilInstallerCli.exe; then
                  break
              fi
              if [ "$i" -eq 5 ]; then
                  echo "Upload failed after 5 attempts" >&2
                  exit 1
              fi
              echo "Upload attempt $i failed (likely transient GH 5xx), retrying in 15s..." >&2
              sleep 15
          done
          gh release edit devbuild --title "DevBuild $RELEASE_TAG" --prerelease=false --latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ env.release_tag }}

